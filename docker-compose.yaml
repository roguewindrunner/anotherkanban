services:
  postgres:
    image: postgres:17
    container_name: anotherkanban-postgres
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=anotherkanban
      - POSTGRES_USER=kanban
      - PGUSER=kanban
      - POSTGRES_PASSWORD=kanban
    ports:
      - '5432:5432'
    expose:
      - 5432
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
